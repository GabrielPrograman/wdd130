<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Learn about White Water Rafting, our history, and our dedicated team of guides. Join us for unforgettable rafting adventures!">
    <meta name="author" content="Gabriel Alejandro">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/zsplash.png" alt="Rafting Logo" class="logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting</h1>

        <section class="company-info">
        <div class="contact-text">
          <p>123 Main River Street</p>
          <p>Kolob, California</p>
          <p>+1 999 999 9999</p>
          <p>info@whitewater.com</p>
        </div>
    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6512742.1903947955!2d-124.60125594203059!3d37.15151302849954!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb9fe5f285e3d%3A0x8b5109a227086f55!2sCalifornia%2C%20EE.%20UU.!5e0!3m2!1ses-419!2sve!4v1775069576213!5m2!1ses-419!2sve" width="600" height="450" loading="lazy"></iframe>
    </div>
    </section>

    <section class="contact-form">
            <form action="#" method="post">
            <div class="form-item">
            <label for="user_name">Name</label>
            <input type="text" id="user_name" name="user_name" placeholder="Full Name" required>
        </div>
    
    <div class="form-item">
        <label for="user_email">Email</label>
        <input type="email" id="user_email" name="user_email" placeholder="Email Address" required>
        </div>

        <fieldset>
            <legend>Message Purpose</legend>
            <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
            <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question</label>
            <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion</label>
        </fieldset>

        <div class="form-item">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Type here..."></textarea>
        </div>

        <div class="form-item checkbox">
            <input type="checkbox" id="newsletter" name="newsletter">
            <label for="newsletter">Please subscribe me to the monthly newsletter</label>
            </div>

            <button type="submit">Send Message</button>
            </form>
            </section>

            <section class="employee-profiles">
                <h2>Our Team</h2>
                <div class="profile-gallery">
                    <figure>
                        <img src="images/employee1.jpg" alt="Manager Profile">
                        <figcaption>John Doe - General Manager</figcaption>
                        </figure>
                        <figure>
                            <img src="images/employee2.jpg" alt="Guide Profile">
                            <figcaption>Jane Smith - Lead River Guide</figcaption>
                            </figure>
                            <figure>
                                <img src="images/employee3.jpg" alt="Director Profile">
                                <figcaption>Robinson Smith - Safety Director</figcaption>
                                </figure>
                                </div>
                                </section>
                            </main>
    <footer>
        <p>&copy; 2026 White Water Rafting | Gabriel Alejandro</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com"><img src="images/facebook.svg" alt="Facebook Icon"></a>
            <a href="https://www.linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn Icon"></a>
            <a href="https://www.instagram.com"><img src="images/instagram.svg" alt="Instagram Icon"></a>
        </nav>
    </footer>
</body>
</html>
